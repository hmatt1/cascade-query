name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov ruff

      - name: Lint
        run: python -m ruff check .

      - name: Run test suite
        run: |
          python -m pytest -q \
            --cov=src/cascade \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=95

      - name: Enforce branch coverage threshold
        run: |
          python - <<'PY'
          import json
          import sys

          with open("coverage.json", encoding="utf-8") as fh:
              totals = json.load(fh)["totals"]

          branch_cov = totals["percent_branches_covered"]
          threshold = 90.0
          print(f"Branch coverage: {branch_cov:.2f}% (threshold {threshold:.2f}%)")
          if branch_cov < threshold:
              sys.exit(1)
          PY

  package:
    name: Package build
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
