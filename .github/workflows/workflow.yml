name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov ruff

      - name: Lint
        run: python -m ruff check .

      - name: Run test suite
        run: |
          python -m pytest -q \
            --cov=src/cascade \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=95

      - name: Enforce branch coverage threshold
        run: |
          python - <<'PY'
          import json
          import sys

          with open("coverage.json", encoding="utf-8") as fh:
              totals = json.load(fh)["totals"]

          branch_cov = totals["percent_branches_covered"]
          threshold = 90.0
          print(f"Branch coverage: {branch_cov:.2f}% (threshold {threshold:.2f}%)")
          if branch_cov < threshold:
              sys.exit(1)
          PY

  package:
    name: Package build
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Compute next semantic version
        id: semver
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          project_version_match = re.search(
              r'(?m)^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"\s*$',
              pyproject,
          )
          if not project_version_match:
              raise SystemExit("Could not find project version in pyproject.toml")

          pyproject_version = tuple(int(x) for x in project_version_match.groups())

          latest_tag = subprocess.check_output(
              ["git", "tag", "--list", "v*", "--sort=-v:refname"],
              text=True,
          ).splitlines()

          if latest_tag:
              tag_match = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)", latest_tag[0])
              if not tag_match:
                  raise SystemExit(f"Latest tag is not semantic: {latest_tag[0]}")
              base = tuple(int(x) for x in tag_match.groups())
          else:
              base = pyproject_version

          major, minor, patch = base
          next_version = f"{major}.{minor}.{patch + 1}"

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"version={next_version}\n")
              fh.write(f"tag=v{next_version}\n")

          print(f"Next version: {next_version}")
          PY

      - name: Update package version for build
        run: |
          python - <<'PY'
          import pathlib
          import re

          version = "${{ steps.semver.outputs.version }}"
          pyproject_path = pathlib.Path("pyproject.toml")
          pyproject = pyproject_path.read_text(encoding="utf-8")

          updated = re.sub(
              r'(?m)^version\s*=\s*"\d+\.\d+\.\d+"\s*$',
              f'version = "{version}"',
              pyproject,
              count=1,
          )
          pyproject_path.write_text(updated, encoding="utf-8")
          PY

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.semver.outputs.tag }}"
          git push origin "${{ steps.semver.outputs.tag }}"
