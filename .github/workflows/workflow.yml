name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      PYTHON_GIL: "0"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14t"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov ruff

      - name: Lint
        run: python -m ruff check .

      - name: Verify free-threaded runtime
        run: |
          python - <<'PY'
          import sys
          import sysconfig
          
          if sysconfig.get_config_var("Py_GIL_DISABLED") != 1:
              raise SystemExit("Interpreter is not a free-threaded build.")
          if sys._is_gil_enabled():
              raise SystemExit("GIL is enabled. Expected free-threaded execution (PYTHON_GIL=0).")
          print("Verified free-threaded runtime with GIL disabled.")
          PY

      - name: Run test suite
        run: |
          python -m pytest -q \
            --cov=src/cascade \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=95

      - name: Generate performance report (GIL disabled)
        env:
          PYTHON_GIL: "0"
        run: |
          python -m benchmarks.performance_suite \
            --report-dir artifacts/performance/gil-disabled \
            --assert-thresholds \
            --exclude-scenarios compute-many-parallel-speedup

      - name: Run isolated compute-many parallel speedup check
        env:
          PYTHON_GIL: "0"
        run: |
          python -m pytest -q tests/test_performance.py::test_compute_many_parallel_speedup_scenario

      - name: Generate performance report (GIL enabled)
        env:
          PYTHON_GIL: "1"
        run: |
          python -m benchmarks.performance_suite \
            --report-dir artifacts/performance/gil-enabled

      - name: Compare free-threaded vs GIL performance
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          perf_root = Path("artifacts/performance")
          free_report_path = perf_root / "gil-disabled" / "performance-report.json"
          gil_report_path = perf_root / "gil-enabled" / "performance-report.json"

          free_report = json.loads(free_report_path.read_text(encoding="utf-8"))
          gil_report = json.loads(gil_report_path.read_text(encoding="utf-8"))

          if free_report.get("runtime_mode") != "gil-disabled":
              raise SystemExit(
                  f"Expected free-threaded run to report runtime_mode=gil-disabled, got {free_report.get('runtime_mode')!r}"
              )
          if gil_report.get("runtime_mode") != "gil-enabled":
              raise SystemExit(
                  f"Expected GIL run to report runtime_mode=gil-enabled, got {gil_report.get('runtime_mode')!r}"
              )

          scenario_name = "compute-many-parallel-speedup"

          def scenario_by_name(report: dict, name: str) -> dict:
              for row in report["results"]:
                  if row["name"] == name:
                      return row
              raise SystemExit(f"Missing performance scenario: {name}")

          free_row = scenario_by_name(free_report, scenario_name)
          gil_row = scenario_by_name(gil_report, scenario_name)

          free_speedup = float(free_row["metric_value"])
          gil_speedup = float(gil_row["metric_value"])
          improvement = free_speedup / max(gil_speedup, 1e-9)
          min_improvement = 1.05
          comparison = {
              "scenario": scenario_name,
              "metric_name": free_row["metric_name"],
              "free_threaded": {
                  "runtime_mode": free_report["runtime_mode"],
                  "metric_value": free_speedup,
                  "details": free_row.get("details", {}),
              },
              "gil_enabled": {
                  "runtime_mode": gil_report["runtime_mode"],
                  "metric_value": gil_speedup,
                  "details": gil_row.get("details", {}),
              },
              "speedup_ratio_free_vs_gil": improvement,
              "minimum_required_ratio": min_improvement,
              "passed": improvement >= min_improvement,
          }

          comparison_json = perf_root / "performance-comparison.json"
          comparison_md = perf_root / "performance-comparison.md"
          comparison_json.write_text(json.dumps(comparison, indent=2, sort_keys=True), encoding="utf-8")
          comparison_md.write_text(
              "\n".join(
                  [
                      "# Free-threaded vs GIL Performance Comparison",
                      "",
                      f"- Scenario: `{scenario_name}`",
                      f"- Metric: `{free_row['metric_name']}`",
                      f"- Free-threaded speedup: `{free_speedup:.3f}x`",
                      f"- GIL-enabled speedup: `{gil_speedup:.3f}x`",
                      f"- Ratio (free-threaded / GIL-enabled): `{improvement:.3f}x`",
                      f"- Required minimum ratio: `{min_improvement:.3f}x`",
                      f"- Status: `{'PASS' if comparison['passed'] else 'FAIL'}`",
                      "",
                      "```json",
                      json.dumps(comparison, indent=2),
                      "```",
                      "",
                  ]
              ),
              encoding="utf-8",
          )

          print(f"Free-threaded speedup: {free_speedup:.3f}x")
          print(f"GIL-enabled speedup: {gil_speedup:.3f}x")
          print(f"Free-threaded/GIL ratio: {improvement:.3f}x")
          if improvement < min_improvement:
              raise SystemExit(
                  f"Free-threaded run did not beat GIL-enabled run by required ratio "
                  f"({improvement:.3f}x < {min_improvement:.3f}x)."
              )
          PY

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: artifacts/performance/

      - name: Enforce branch coverage threshold
        run: |
          python - <<'PY'
          import json
          import sys

          with open("coverage.json", encoding="utf-8") as fh:
              totals = json.load(fh)["totals"]

          branch_cov = totals["percent_branches_covered"]
          threshold = 90.0
          print(f"Branch coverage: {branch_cov:.2f}% (threshold {threshold:.2f}%)")
          if branch_cov < threshold:
              sys.exit(1)
          PY

  package:
    name: Package build
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          cache: "pip"

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          cache: "pip"

      - name: Verify free-threaded runtime
        env:
          PYTHON_GIL: "0"
        run: |
          python - <<'PY'
          import sys
          import sysconfig
          
          if sysconfig.get_config_var("Py_GIL_DISABLED") != 1:
              raise SystemExit("Interpreter is not a free-threaded build.")
          if sys._is_gil_enabled():
              raise SystemExit("GIL is enabled. Expected free-threaded execution (PYTHON_GIL=0).")
          print("Verified free-threaded runtime with GIL disabled.")
          PY

      - name: Compute next semantic version
        id: semver
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import subprocess
          import urllib.request

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          project_version_match = re.search(
              r'(?m)^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"\s*$',
              pyproject,
          )
          if not project_version_match:
              raise SystemExit("Could not find project version in pyproject.toml")

          pyproject_version = tuple(int(x) for x in project_version_match.groups())

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*", "--sort=-v:refname"],
              text=True,
          ).splitlines()

          git_versions = []
          for tag in tags:
              tag_match = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)", tag)
              if tag_match:
                  git_versions.append(tuple(int(x) for x in tag_match.groups()))

          published_versions = set()
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/query-cascade/json", timeout=10) as response:
                  payload = json.load(response)
              for version_text in payload.get("releases", {}).keys():
                  release_match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", version_text)
                  if release_match:
                      published_versions.add(tuple(int(x) for x in release_match.groups()))
          except Exception as exc:  # pragma: no cover - best effort in CI
              print(f"Warning: unable to query PyPI releases: {exc}")

          baselines = [pyproject_version]
          if git_versions:
              baselines.append(max(git_versions))
          if published_versions:
              baselines.append(max(published_versions))
          major, minor, patch = max(baselines)

          next_tuple = (major, minor, patch + 1)
          while next_tuple in published_versions:
              major, minor, patch = next_tuple
              next_tuple = (major, minor, patch + 1)
          next_version = ".".join(str(part) for part in next_tuple)

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"version={next_version}\n")
              fh.write(f"tag=v{next_version}\n")

          print(f"Next version: {next_version}")
          PY

      - name: Update package version for build
        run: |
          python - <<'PY'
          import pathlib
          import re

          version = "${{ steps.semver.outputs.version }}"
          pyproject_path = pathlib.Path("pyproject.toml")
          pyproject = pyproject_path.read_text(encoding="utf-8")

          updated = re.sub(
              r'(?m)^version\s*=\s*"\d+\.\d+\.\d+"\s*$',
              f'version = "{version}"',
              pyproject,
              count=1,
          )
          pyproject_path.write_text(updated, encoding="utf-8")
          PY

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        id: pypi_publish
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Verify published package install
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            echo "Attempt ${attempt}: installing query-cascade==${VERSION} from PyPI"
            if python -m pip install --upgrade pip && python -m pip install --no-cache-dir "query-cascade==${VERSION}"; then
              python -c "import cascade; print(f'Installed cascade from: {cascade.__file__}')"
              exit 0
            fi
            if [ "${attempt}" -lt 5 ]; then
              echo "Package not available yet, waiting 15 seconds before retry..."
              sleep 15
            fi
          done
          echo "Failed to install query-cascade==${VERSION} after publish."
          exit 1

      - name: Push release tag
        if: always() && steps.pypi_publish.outcome == 'success'
        run: |
          TAG="${{ steps.semver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally."
          else
            git tag "${TAG}"
          fi
          if [ -n "$(git ls-remote --tags origin "refs/tags/${TAG}")" ]; then
            echo "Tag ${TAG} already exists on origin."
          else
            git push origin "${TAG}"
          fi
